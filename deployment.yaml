apiVersion: apps/v1
kind: Deployment
metadata:
  name: python-cicd
  labels:
    app: python-cicd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: python-cicd
  template:
    metadata:
      labels:
        app: python-cicd
    spec:
      imagePullSecrets:
      - name: nexus-regcred
      containers:
      - name: python-cicd
        image: nexus.petclinic.local/petclinic:latest
        ports:
        - containerPort: 8080
